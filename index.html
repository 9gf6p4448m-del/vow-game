<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#050508" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Vow 誓約" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <title>Vow — 誓約</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230b0b10'/%3E%3Crect x='7' y='2' width='2' height='9' fill='%238b0000'/%3E%3Crect x='4' y='11' width='8' height='2' fill='%238b0000'/%3E%3C/svg%3E"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #050508;
        height: 100%;
        overflow: hidden;
        /* 手機順手感:禁掉瀏覽器手勢/選字/長按選單,觸控全交給遊戲 */
        touch-action: none;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }
      #game {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas {
        image-rendering: pixelated;
        touch-action: none;
      }
      /* 直向手機:蓋一層「請橫置」提示(桌面與橫向不受影響) */
      #rotate-hint {
        display: none;
      }
      @media (orientation: portrait) and (pointer: coarse) {
        #rotate-hint {
          display: flex;
          position: fixed;
          inset: 0;
          z-index: 9999;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 18px;
          background: #050508;
          color: #e8e2d6;
          text-align: center;
          font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
          padding: 24px;
        }
        #rotate-hint .rh-icon {
          font-size: 64px;
          animation: rh-turn 2.4s ease-in-out infinite;
        }
        #rotate-hint p {
          margin: 0;
          font-size: 22px;
          letter-spacing: 0.08em;
          color: #d99a4a;
        }
        #rotate-hint small {
          color: #918a99;
          font-size: 15px;
        }
      }
      @keyframes rh-turn {
        0%,
        100% {
          transform: rotate(-12deg);
        }
        50% {
          transform: rotate(78deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #rotate-hint .rh-icon {
          animation: none;
        }
      }
    </style>
    <script type="module" crossorigin src="./assets/index-BvZQEt3s.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/phaser-EAQ7OP7l.js">
  <link rel="manifest" href="./manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="./registerSW.js"></script></head>
  <body>
    <div id="game"></div>
    <div id="rotate-hint" aria-hidden="true">
      <div class="rh-icon">📱</div>
      <p>請將手機橫置遊玩</p>
      <small>Vow 誓約 — 橫向雙拇指操作</small>
    </div>
    <script>
      // 首次觸控(橫向時)best-effort 進入全螢幕:Android 有效;iOS 靠「加到主畫面」的 standalone
      window.addEventListener(
        'touchend',
        function () {
          if (!window.matchMedia('(orientation: landscape)').matches) return;
          var el = document.documentElement;
          if (el.requestFullscreen) el.requestFullscreen().catch(function () {});
        },
        { once: true, passive: true },
      );
    </script>
  </body>
</html>
